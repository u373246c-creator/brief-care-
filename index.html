<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brief Care</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Brief Care">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#0f172a;
  color:white;
  padding:16px;
}
h2,h3,p{margin-top:0}
.card{
  background:#1e293b;
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
}
button{
  padding:12px 14px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  font-weight:bold;
  margin-right:8px;
  margin-top:8px;
}
button.sub{
  background:#334155;
  color:white;
}
textarea,input{
  width:100%;
  margin-top:8px;
  padding:10px;
  border-radius:10px;
  border:none;
  box-sizing:border-box;
}
pre{
  white-space:pre-wrap;
  word-break:break-word;
}
.status{
  font-size:14px;
  color:#cbd5e1;
  margin-top:8px;
}
.tableWrap{
  overflow-x:auto;
  margin-top:12px;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
  background:#0f172a;
}
th,td{
  border:1px solid #475569;
  padding:8px;
  text-align:left;
  vertical-align:top;
}
th{
  background:#334155;
}
.small{
  font-size:12px;
  color:#cbd5e1;
}
</style>
</head>

<body>

<h2>Brief Care</h2>
<p>短く整えるための自分用メモ</p>

<div class="card">
  <h3>朝チェック</h3>
  <input id="mood" placeholder="気分 0-10">
  <input id="fatigue" placeholder="疲れ 0-10">
  <input id="task" placeholder="今日やること1つ">
  <button onclick="saveMorning()">保存</button>
  <button class="sub" onclick="loadMorning()">今日の保存内容を表示</button>
  <div id="morningStatus" class="status"></div>
</div>

<div class="card">
  <h3>パニックボタン</h3>
  <button onclick="panic()">いましんどい</button>
  <button class="sub" onclick="stopPanic()">停止</button>
  <p id="breath"></p>
</div>

<div class="card">
  <h3>思考ログ</h3>
  <textarea id="log" placeholder="頭の中をそのまま書く"></textarea>
  <button onclick="saveLog()">保存</button>
  <button class="sub" onclick="showTodayLog()">今日の履歴</button>
  <div id="logStatus" class="status"></div>
  <pre id="history"></pre>
</div>

<div class="card">
  <h3>夜チェック</h3>
  <input id="goodThing" placeholder="今日よかったこと1つ">
  <input id="hardThing" placeholder="今日しんどかったこと1つ">
  <button onclick="saveNight()">保存</button>
  <button class="sub" onclick="loadNight()">今日の保存内容を表示</button>
  <div id="nightStatus" class="status"></div>
</div>

<div class="card">
  <h3>悲嘆プロセス</h3>
  <pre>
1 精神的打撃と麻痺状態
2 否認
3 パニック
4 怒りと不当感
5 敵意とうらみ
6 罪意識
7 空想形成・幻想
8 孤独感と抑うつ
9 精神的混乱とアパシー
10 あきらめ・受容
11 新しい希望・ユーモアと笑いの再発見
12 立ち直りの段階・新たなアイデンティティの誕生
  </pre>
</div>

<div class="card">
  <h3>全履歴</h3>
  <p class="small">朝チェック・夜チェック・思考ログを日付ごとに一覧表示します</p>
  <button onclick="renderAllHistory()">全履歴を表示</button>
  <button class="sub" onclick="downloadCSV()">CSV出力</button>
  <div id="allHistoryStatus" class="status"></div>
  <div id="allHistoryTable" class="tableWrap"></div>
</div>

<script>
const today = new Date().toISOString().slice(0,10);
let panicTimer = null;

function getStore(){
  return JSON.parse(localStorage.getItem("briefCareStore") || "{}");
}

function saveStore(store){
  localStorage.setItem("briefCareStore", JSON.stringify(store));
}

function ensureDay(store, date){
  if(!store[date]){
    store[date] = {
      morning: { mood:"", fatigue:"", task:"" },
      night: { goodThing:"", hardThing:"" },
      logs: []
    };
  }
  if(!store[date].morning) store[date].morning = { mood:"", fatigue:"", task:"" };
  if(!store[date].night) store[date].night = { goodThing:"", hardThing:"" };
  if(!store[date].logs) store[date].logs = [];
}

function escapeHTML(str){
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function csvEscape(value){
  const s = String(value ?? "");
  return '"' + s.replace(/"/g, '""') + '"';
}

function saveMorning(){
  const store = getStore();
  ensureDay(store, today);
  store[today].morning = {
    mood: document.getElementById("mood").value,
    fatigue: document.getElementById("fatigue").value,
    task: document.getElementById("task").value
  };
  saveStore(store);
  document.getElementById("morningStatus").textContent = "朝チェックを保存しました";
}

function loadMorning(){
  const store = getStore();
  ensureDay(store, today);
  const data = store[today].morning;
  document.getElementById("mood").value = data.mood || "";
  document.getElementById("fatigue").value = data.fatigue || "";
  document.getElementById("task").value = data.task || "";
  document.getElementById("morningStatus").textContent = data.mood || data.fatigue || data.task
    ? "今日の朝チェックを読み込みました"
    : "今日の朝チェックはまだありません";
}

function saveLog(){
  const text = document.getElementById("log").value.trim();
  if(!text){
    document.getElementById("logStatus").textContent = "空欄です";
    return;
  }

  const store = getStore();
  ensureDay(store, today);
  store[today].logs.push({
    time: new Date().toLocaleTimeString("ja-JP", {hour:"2-digit", minute:"2-digit"}),
    text: text
  });
  saveStore(store);

  document.getElementById("log").value = "";
  document.getElementById("logStatus").textContent = "思考ログを保存しました";
  showTodayLog();
}

function showTodayLog(){
  const store = getStore();
  ensureDay(store, today);
  const logs = store[today].logs;

  if(logs.length === 0){
    document.getElementById("history").textContent = "まだ履歴はありません";
    return;
  }

  document.getElementById("history").textContent = logs.map(item =>
    "【" + item.time + "】\n" + item.text
  ).join("\n\n---\n\n");
}

function saveNight(){
  const store = getStore();
  ensureDay(store, today);
  store[today].night = {
    goodThing: document.getElementById("goodThing").value,
    hardThing: document.getElementById("hardThing").value
  };
  saveStore(store);
  document.getElementById("nightStatus").textContent = "夜チェックを保存しました";
}

function loadNight(){
  const store = getStore();
  ensureDay(store, today);
  const data = store[today].night;

  document.getElementById("goodThing").value = data.goodThing || "";
  document.getElementById("hardThing").value = data.hardThing || "";
  document.getElementById("nightStatus").textContent = data.goodThing || data.hardThing
    ? "今日の夜チェックを読み込みました"
    : "今日の夜チェックはまだありません";
}

function panic(){
  stopPanic();
  const phases = ["吸う 4秒", "止める 4秒", "吐く 6秒"];
  let i = 0;
  document.getElementById("breath").textContent = phases[0];
  panicTimer = setInterval(() => {
    i = (i + 1) % phases.length;
    document.getElementById("breath").textContent = phases[i];
  }, 2000);
}

function stopPanic(){
  if(panicTimer){
    clearInterval(panicTimer);
    panicTimer = null;
  }
  document.getElementById("breath").textContent = "";
}

function renderAllHistory(){
  const store = getStore();
  const dates = Object.keys(store).sort().reverse();
  const container = document.getElementById("allHistoryTable");
  const status = document.getElementById("allHistoryStatus");

  if(dates.length === 0){
    container.innerHTML = "";
    status.textContent = "履歴はまだありません";
    return;
  }

  let html = `
    <table>
      <thead>
        <tr>
          <th>日付</th>
          <th>気分</th>
          <th>疲れ</th>
          <th>今日やること</th>
          <th>よかったこと</th>
          <th>しんどかったこと</th>
          <th>思考ログ</th>
        </tr>
      </thead>
      <tbody>
  `;

  dates.forEach(date => {
    ensureDay(store, date);
    const day = store[date];
    const logsText = day.logs.length
      ? day.logs.map(log => `【${log.time}】 ${log.text}`).join("\n")
      : "";

    html += `
      <tr>
        <td>${escapeHTML(date)}</td>
        <td>${escapeHTML(day.morning.mood)}</td>
        <td>${escapeHTML(day.morning.fatigue)}</td>
        <td>${escapeHTML(day.morning.task)}</td>
        <td>${escapeHTML(day.night.goodThing)}</td>
        <td>${escapeHTML(day.night.hardThing)}</td>
        <td>${escapeHTML(logsText)}</td>
      </tr>
    `;
  });

  html += "</tbody></table>";
  container.innerHTML = html;
  status.textContent = dates.length + "日分の履歴を表示しました";
}

function downloadCSV(){
  const store = getStore();
  const dates = Object.keys(store).sort();

  if(dates.length === 0){
    document.getElementById("allHistoryStatus").textContent = "CSVに出せる履歴がありません";
    return;
  }

  let rows = [
    [
      "date",
      "mood",
      "fatigue",
      "task",
      "goodThing",
      "hardThing",
      "logTime",
      "logText"
    ]
  ];

  dates.forEach(date => {
    ensureDay(store, date);
    const day = store[date];

    if(day.logs.length === 0){
      rows.push([
        date,
        day.morning.mood || "",
        day.morning.fatigue || "",
        day.morning.task || "",
        day.night.goodThing || "",
        day.night.hardThing || "",
        "",
        ""
      ]);
    } else {
      day.logs.forEach(log => {
        rows.push([
          date,
          day.morning.mood || "",
          day.morning.fatigue || "",
          day.morning.task || "",
          day.night.goodThing || "",
          day.night.hardThing || "",
          log.time || "",
          log.text || ""
        ]);
      });
    }
  });

  const csv = rows.map(row => row.map(csvEscape).join(",")).join("\n");
  const bom = "\uFEFF";
  const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "brief-care-history.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  document.getElementById("allHistoryStatus").textContent = "CSVを出力しました";
}

loadMorning();
loadNight();
showTodayLog();
renderAllHistory();
</script>

</body>
</html>
